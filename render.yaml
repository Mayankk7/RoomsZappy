services:
  - type: web
    name: united-hotels-test
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:frontend
    startCommand: npm start
    healthCheckPath: /api/hotels/public?limit=1&offset=0
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: REQUIRE_EMAIL_OTP
        value: "false"
      - key: PG_SSL
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
